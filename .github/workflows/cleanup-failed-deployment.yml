name: Cleanup failed PyPI deployment

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/cleanup-failed-deployment.yml
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  cleanup:
    name: Delete duplicate failed PyPI deployment
    runs-on: ubuntu-latest
    steps:
      - name: Mark failed deployment inactive and delete it
        env:
          DEPLOYMENT_ID: "4802930838"
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          API="https://api.github.com/repos/${REPO}"
          AUTH_HEADER="Authorization: Bearer ${GH_TOKEN}"
          API_VERSION="X-GitHub-Api-Version: 2022-11-28"

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "$AUTH_HEADER" \
            -H "$API_VERSION" \
            "$API/deployments/$DEPLOYMENT_ID/statuses" \
            -d '{"state":"inactive","environment":"pypi","description":"Deactivate duplicate failed PyPI deployment before cleanup"}'

          curl -fsSL \
            -X DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "$AUTH_HEADER" \
            -H "$API_VERSION" \
            "$API/deployments/$DEPLOYMENT_ID"
